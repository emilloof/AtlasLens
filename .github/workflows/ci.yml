name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'advancedweb/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'advancedweb/**'
      - '.github/workflows/ci.yml'

jobs:
  test-and-build:
    name: Test and Build (advancedweb)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: advancedweb
    env:
      CI: true
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: advancedweb/package-lock.json

      - name: Install dependencies
        run: npm ci

      # This step confirms the secret is actually reaching the runner
      - name: Verify Environment
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL is not set. Check GitHub Secrets."
            exit 1
          else
            echo "DATABASE_URL is confirmed."
          fi

      - name: Run Jest tests
        run: npm run test:ci

      - name: Build project
        run: npm run build